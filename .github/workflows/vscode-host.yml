name: Extension Host Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  extension-host-tests:
    name: VS Code Extension Host Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Compile extension
        run: npm run compile

      - name: Compile extension host test suite
        run: tsc -p tsconfig.suite.json --noEmitOnError false

      - name: Run extension host tests (headless)
        run: xvfb-run -a npx vscode-test
        env:
          DISPLAY: ":99.0"
